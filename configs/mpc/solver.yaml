schema_version: "1.0"

solver:
  backend: casadi
  nlp_solver: ipopt
  allow_numpy_fallback: false

ipopt:
  tol: 1.0e-4
  max_iter: 500
  acceptable_tol: 1.0e-3
  acceptable_iter: 20
  warm_start_init_point: true
  print_level: 0
  linear_solver: mumps
  hessian_approximation: limited-memory

casadi:
  expand: true
  jit: false

timeouts:
  solve_ms: 200

weights:
  position: 10.0
  yaw: 2.0
  velocity: 1.0
  acceleration: 0.1
  steering: 0.1
  smoothness: 1.0
  obstacle_slack: 1000.0
  road_slack: 1000.0
