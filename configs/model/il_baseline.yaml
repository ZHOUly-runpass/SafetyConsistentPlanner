schema_version: "1.0"

model:
  name: il_baseline
  type: vector_mlp

scene_encoder:
  type: vector
  d_scene: 256
  ego_feature_dim: 32
  agent_feature_dim: 32
  map_feature_dim: 32
  route_feature_dim: 32

il_head:
  type: mlp
  hidden_dim: 256
  num_future_points: 8

optimizer:
  name: adam
  lr: 1.0e-4
  weight_decay: 1.0e-5

scheduler:
  type: reduce_on_plateau
  factor: 0.5
  patience: 10

training:
  batch_size: 32
  max_epochs: 50
  gradient_clip_norm: 1.0
  validation_every_n_epochs: 1

loss:
  expert_weight: 1.0
  smooth_weight: 0.01
